version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    expose:
      - "9000"
    volumes:
      - db-data:/var/www/html/database
    env_file:
      - ./backend/.env

  pinger:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: php artisan switches:ping
    volumes:
      - db-data:/var/www/html/database
    env_file:
      - ./backend/.env
    depends_on:
      - backend

  frontend:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  db-data:
